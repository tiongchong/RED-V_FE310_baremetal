# SparkFun RED-V RedBoard / SiFive FE310-G002.
#
# This file intentionally uses OpenOCD 0.10-era syntax:
#   interface jlink
#   adapter_khz
#
# Newer upstream configs use "adapter driver jlink" and "adapter speed", but
# older SiFive/RISC-V OpenOCD builds report syntax errors for those commands.

interface jlink
transport select jtag
adapter_khz 4000

set _CHIPNAME riscv
jtag newtap $_CHIPNAME cpu -irlen 5 -expected-id 0x20000913

set _TARGETNAME $_CHIPNAME.cpu
target create $_TARGETNAME.0 riscv -chain-position $_TARGETNAME
$_TARGETNAME.0 configure -work-area-phys 0x80000000 -work-area-size 0x4000 -work-area-backup 0

if { [catch { riscv set_enable_virt2phys off }] } {
    echo "Info: this OpenOCD does not support riscv set_enable_virt2phys"
}

if { [catch { riscv set_enable_virtual off }] } {
    echo "Info: this OpenOCD does not support riscv set_enable_virtual"
}

flash bank onboard_spi_flash fespi 0x20000000 0 0 0 $_TARGETNAME.0

init
if { [catch { jlink jtag 3 }] } {
    echo "Info: this OpenOCD does not require explicit J-Link JTAG version"
}
halt
flash protect 0 1 last off
echo "Ready for RED-V / FE310 flash commands"
